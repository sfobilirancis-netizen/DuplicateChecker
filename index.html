<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div>
      <label for="lastName">Beneficiary's Last Name</label>
      <input id="lastName" type="text" placeholder="Enter beneficiary's last name" autocomplete="off" />
    </div>

    <div>
      <label for="firstName">Beneficiary's First Name</label>
      <input id="firstName" type="text" placeholder="Enter beneficiary's first name" autocomplete="off" />
    </div>

    <div>
      <label for="extName">Beneficiary's Extension (if any)</label>
      <input id="extName" type="text" placeholder="e.g. JR / SR / II" autocomplete="off" />
    </div>

    <div>
      <label for="assistanceType">Type of Assistance</label>
      <select id="assistanceType" aria-label="Type of Assistance">
        <option value="" disabled selected>Select type of assistance</option>
        <option value="Cash Relief Assistance">Cash Relief Assistance</option>
        <option value="Medical Assistance">Medical Assistance</option>
        <option value="Food Assistance">Food Assistance</option>
        <option value="Funeral Assistance">Funeral Assistance</option>
        <option value="Transportation Assistance">Transportation Assistance</option>
        <option value="Educational Assistance">Educational Assistance</option>
      </select>
    </div>

    <button id="scanBtn">Scan QR</button>
    <div id="status"></div>
    <div id="result" style="display: none;">
        <div id="fullName"></div>
        <button onclick="closeResult()">Scan Another</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("qr-reader");
        const scanBtn = document.getElementById("scanBtn");
        const statusDiv = document.getElementById("status");
        const resultDiv = document.getElementById("result");
        const fullNameDiv = document.getElementById("fullName");
        
        // Input elements
        const firstNameInput = document.getElementById("firstName");
        const lastNameInput = document.getElementById("lastName");
        const extNameInput = document.getElementById("extName");

        let isScanning = false;

        scanBtn.addEventListener("click", async () => {
            if (isScanning) {
                stopScanner();
            } else {
                startScanner();
            }
        });

        async function startScanner() {
            try {
                // Create QR reader div dynamically
                const qrReader = document.createElement("div");
                qrReader.id = "qr-reader";
                document.body.appendChild(qrReader);

                scanBtn.textContent = "Stop Scanner";
                statusDiv.textContent = "Scanning...";
                statusDiv.style.display = "block";
                resultDiv.style.display = "none";

                isScanning = true;

                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    onScanError
                );
            } catch (err) {
                statusDiv.textContent = "Error: " + err;
            }
        }

        function stopScanner() {
            html5QrCode.stop().then(() => {
                isScanning = false;
                scanBtn.textContent = "Scan QR";
                statusDiv.style.display = "none";
                
                // Remove QR reader div
                const qrReader = document.getElementById("qr-reader");
                if (qrReader) {
                    qrReader.remove();
                }
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            try {
                const data = JSON.parse(decodedText);
                
                // Auto-populate the input fields
                firstNameInput.value = data.subject?.fName || "";
                lastNameInput.value = data.subject?.lName || "";
                extNameInput.value = data.subject?.Suffix || "";
                
                // Show result
                const suffix = data.subject?.Suffix || "";
                const lName = data.subject?.lName || "N/A";
                const fName = data.subject?.fName || "N/A";
                
                const fullName = `${fName} ${suffix} ${lName}`.trim();
                fullNameDiv.textContent = fullName;
                
                stopScanner();
                resultDiv.style.display = "block";
                
            } catch (error) {
                statusDiv.textContent = "Invalid QR data";
            }
        }

        function onScanError(error) {
            // Silent for continuous scan
        }

        function closeResult() {
            resultDiv.style.display = "none";
            startScanner();
        }
    </script>
</body>
</html>
