<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duplicate Checker</title>
  </head>

  <body>
    <header>
      <h1>Department of Social Welfare and Development</h1>
      <h2>Duplicate Checker</h2>
    </header>

    <main>
      <h3>Beneficiary Duplicate Validation</h3>
      
      <form id="searchForm">
        <div>
          <label for="lastName">Last Name:</label>
          <input id="lastName" type="text" placeholder="Enter last name">
        </div>
        
        <div>
          <label for="firstName">First Name:</label>
          <input id="firstName" type="text" placeholder="Enter first name">
        </div>
        
        <div>
          <label for="extName">Extension Name:</label>
          <input id="extName" type="text" placeholder="JR, SR, etc.">
        </div>
        
        <div>
          <label for="assistanceType">Type of Assistance:</label>
          <select id="assistanceType">
            <option value="">Select type</option>
            <option value="Cash Relief Assistance">Cash Relief Assistance</option>
            <option value="Medical Assistance">Medical Assistance</option>
            <option value="Food Assistance">Food Assistance</option>
            <option value="Funeral Assistance">Funeral Assistance</option>
            <option value="Transportation Assistance">Transportation Assistance</option>
            <option value="Educational Assistance">Educational Assistance</option>
          </select>
        </div>
        
        <button type="button" onclick="checkDuplicate()">Check Duplicate</button>
        <button type="button" onclick="resetForm()">Reset</button>
        <button type="button" onclick="debugData()">Debug Data</button>
      </form>

      <div id="message"></div>
      <div id="debug" style="display: none; background: #f0f0f0; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px;"></div>

      <div id="results" style="display: none;">
        <h4>Match Results</h4>
        <div id="resultsTable"></div>
      </div>
    </main>

    <script>
      const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv';
      
      let cachedData = null;

      async function fetchData() {
        if (cachedData) return cachedData;
        
        try {
          console.log('Fetching CSV data...');
          const response = await fetch(SPREADSHEET_URL);
          const csvText = await response.text();
          console.log('Raw CSV preview:', csvText.substring(0, 500));
          
          cachedData = parseCSV(csvText);
          console.log('Parsed data:', cachedData.slice(0, 3)); // Log first 3 rows
          
          return cachedData;
        } catch (error) {
          console.error('Error fetching CSV:', error);
          throw error;
        }
      }

      function parseCSV(csvText) {
        const lines = csvText.trim().split('\n').slice(1); // Skip header
        return lines.map((line, index) => {
          const cols = parseCSVLine(line);
          return {
            date: cols[0]?.trim() || '',
            lastName: cols[1]?.trim() || '',
            firstName: cols[2]?.trim() || '',
            extName: cols[3]?.trim() || '',
            assistanceType: cols[4]?.trim() || '',
            rowNumber: index + 2 // +2 because we skipped header and 1-based
          };
        }).filter(row => row.lastName && row.lastName.length > 0);
      }

      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current.trim());
        return result;
      }

      async function checkDuplicate() {
        const payload = getPayload();
        if (!payload.lastName || !payload.firstName || !payload.assistanceType) {
          showMessage('err', 'Please fill Last Name, First Name, and Type of Assistance.');
          return;
        }

        setBusy(true);
        document.getElementById('debug').style.display = 'none';
        showMessage('info', 'Searching...', 'Checking for duplicates...');

        try {
          const data = await fetchData();
          
          console.log('Search payload:', payload);
          console.log('Total records:', data.length);
          
          const matches = data.filter(row => {
            const isLastMatch = row.lastName.toLowerCase().trim() === payload.lastName.toLowerCase().trim();
            const isFirstMatch = row.firstName.toLowerCase().trim() === payload.firstName.toLowerCase().trim();
            const isTypeMatch = row.assistanceType.toLowerCase().trim() === payload.assistanceType.toLowerCase().trim();
            
            console.log(`Row ${row.rowNumber}:`, {
              last: row.lastName,
              first: row.firstName,
              type: row.assistanceType,
              matches: { last: isLastMatch, first: isFirstMatch, type: isTypeMatch }
            });
            
            return isLastMatch && isFirstMatch && isTypeMatch;
          });

          console.log('Final matches:', matches);

          if (matches.length > 0) {
            showMessage('ok', `DUPLICATE FOUND (${matches.length} match${matches.length > 1 ? 'es' : ''})`);
            renderMatches(matches);
          } else {
            showMessage('ok', 'NO DUPLICATE FOUND');
          }
        } catch (error) {
          showMessage('err', 'Error', 'Failed to fetch data from spreadsheet.');
          console.error(error);
        } finally {
          setBusy(false);
        }
      }

      function debugData() {
        fetchData().then(data => {
          const debugEl = document.getElementById('debug');
          debugEl.innerHTML = `
            <strong>Total Records: ${data.length}</strong><br>
            <strong>First 5 records:</strong><br>
            ${data.slice(0, 5).map((row, i) => 
              `Row ${row.rowNumber}: ${row.lastName} ${row.firstName} ${row.extName} | ${row.assistanceType}`
            ).join('<br>')}
          `;
          debugEl.style.display = 'block';
        }).catch(err => {
          document.getElementById('debug').innerHTML = 'Error loading data: ' + err.message;
          document.getElementById('debug').style.display = 'block';
        });
      }

      function getPayload() {
        return {
          lastName: document.getElementById("lastName").value.trim(),
          firstName: document.getElementById("firstName").value.trim(),
          extName: document.getElementById("extName").value.trim(),
          assistanceType: document.getElementById("assistanceType").value,
        };
      }

      function setBusy(isBusy) {
        const btn = document.querySelector('button[onclick="checkDuplicate()"]');
        btn.disabled = isBusy;
        btn.textContent = isBusy ? 'Checking...' : 'Check Duplicate';
      }

      function showMessage(type, title, detail = '') {
        const el = document.getElementById("message");
        if (!title) {
          el.innerHTML = '';
          return;
        }
        
        const color = type === 'err' ? 'red' : type === 'ok' ? 'green' : 'blue';
        const bgColor = type === 'err' ? '#fee' : type === 'ok' ? '#efe' : '#eef';
        el.innerHTML = `<div style="padding: 15px; margin: 15px 0; border: 3px solid ${color}; background: ${bgColor}; font-size: 20px; font-weight: bold; text-align: center;">
          ${escapeHtml(title)}
          ${detail ? `<br><small style="font-size: 14px; font-weight: normal;">${escapeHtml(detail)}</small>` : ''}
        </div>`;
      }

      function renderMatches(matches) {
        document.getElementById('results').style.display = 'block';

        let html = `
          <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
              <tr style="background: #dc3545; color: white;">
                <th style="padding: 12px;">Date</th>
                <th style="padding: 12px;">Last Name</th>
                <th style="padding: 12px;">First Name</th>
                <th style="padding: 12px;">Ext</th>
                <th style="padding: 12px;">Type</th>
                <th style="padding: 12px;">Row #</th>
              </tr>
            </thead>
            <tbody>
        `;

        matches.forEach(m => {
          html += `
            <tr style="background: #fff3cd;">
              <td style="padding: 10px;">${escapeHtml(m.date)}</td>
              <td style="padding: 10px; font-weight: bold; color: red;">${escapeHtml(m.lastName)}</td>
              <td style="padding: 10px; font-weight: bold; color: red;">${escapeHtml(m.firstName)}</td>
              <td style="padding: 10px;">${escapeHtml(m.extName)}</td>
              <td style="padding: 10px; background: #ffe6e6; font-weight: bold;">${escapeHtml(m.assistanceType)}</td>
              <td style="padding: 10px; font-weight: bold; color: red;">${escapeHtml(m.rowNumber)}</td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('resultsTable').innerHTML = html;
      }

      function resetForm() {
        document.getElementById('searchForm').reset();
        document.getElementById('message').innerHTML = '';
        document.getElementById('results').style.display = 'none';
        document.getElementById('debug').style.display = 'none';
        document.querySelector('button[onclick="checkDuplicate()"]').textContent = 'Check Duplicate';
        cachedData = null;
      }

      function escapeHtml(text) {
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        };
        return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
      }

      // Enter key support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
          e.preventDefault();
          checkDuplicate();
        }
      });
    </script>
  </body>
</html>
