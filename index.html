<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Duplicate Checker</title>
  </head>
  <body>
    <h1>Duplicate Checker</h1>
    <label>Last Name: <input id="lastName" /></label><br/>
    <label>First Name: <input id="firstName" /></label><br/>
    <label>Ext (JR/SR/II): <input id="extName" /></label><br/>
    <label>Type of Assistance:
      <select id="assistanceType">
        <option value="">Select</option>
        <option value="Cash Relief Assistance">Cash Relief Assistance</option>
        <option value="Medical Assistance">Medical Assistance</option>
        <option value="Food Assistance">Food Assistance</option>
        <option value="Funeral Assistance">Funeral Assistance</option>
        <option value="Transportation Assistance">Transportation Assistance</option>
        <option value="Educational Assistance">Educational Assistance</option>
      </select>
    </label><br/>
    <button onclick="checkDuplicate()">Check Duplicate</button>

    <pre id="output"></pre>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbwKTuHxxd0KVrR_BYuZ6WJV_Dbu7RxlYEhbsTTXC32k6mhnBCMX3Q60TfnTen6twAepDA/exec";

      async function checkDuplicate() {
        const payload = {
          lastName: document.getElementById("lastName").value,
          firstName: document.getElementById("firstName").value,
          extName: document.getElementById("extName").value,
          assistanceType: document.getElementById("assistanceType").value,
        };

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          document.getElementById("output").textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          document.getElementById("output").textContent = "Error: " + err;
        }
      }
    </script>
  </body>
</html>
