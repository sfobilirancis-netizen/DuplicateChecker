<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duplicate Checker</title>
</head>
<body>
  <h1>DSWD Duplicate Checker</h1>
  
  <h3>Beneficiary Search</h3>
  <form id="searchForm">
    <p>
      <label>Last Name: <input id="lastName" type="text"></label>
      <button type="button" onclick="startQRScan()">Scan QR</button>
    </p>
    <p><label>First Name: <input id="firstName" type="text"></label></p>
    <p><label>Ext Name: <input id="extName" type="text"></label></p>
    <p>
      <label>Type: 
        <select id="assistanceType">
          <option value="">Select...</option>
          <option value="Cash Relief Assistance">Cash Relief</option>
          <option value="Medical Assistance">Medical</option>
          <option value="Food Assistance">Food</option>
          <option value="Funeral Assistance">Funeral</option>
          <option value="Transportation Assistance">Transport</option>
          <option value="Educational Assistance">Education</option>
        </select>
      </label>
    </p>
    <p>
      <button onclick="checkDuplicate()">Check Duplicate</button>
      <button onclick="resetForm()">Reset</button>
      <button onclick="testConnection()">Test Data</button>
    </p>
  </form>

  <div id="message"></div>
  <div id="qr-scanner" style="display:none;">
    <h4>Scan QR Code</h4>
    <video id="qr-video" width="300" height="300" autoplay></video>
    <p id="qr-status">Loading camera...</p>
    <button onclick="stopQRScan()">Cancel</button>
  </div>

  <div id="results" style="display:none;">
    <h4>Results</h4>
    <div id="resultsTable"></div>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.20.2/umd/index.min.js"></script>
  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv';
    let cachedData = null;
    let codeReader;
    let videoPlaying = false;

    async function startQRScan() {
      const scanner = document.getElementById('qr-scanner');
      scanner.style.display = 'block';
      document.getElementById('qr-status').textContent = 'Requesting camera...';
      
      try {
        codeReader = new ZXing.BrowserQRCodeReader();
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        
        const video = document.getElementById('qr-video');
        video.srcObject = stream;
        video.play();
        videoPlaying = true;
        
        document.getElementById('qr-status').textContent = 'Scan QR code...';
        
        codeReader.decodeFromVideoDevice(stream, 'qr-video', (result, err) => {
          if (result) {
            processQR(result.text);
          }
        });
        
      } catch (err) {
        document.getElementById('qr-status').textContent = 'Camera error: ' + err.message;
        console.error(err);
      }
    }

    function processQR(text) {
      try {
        const data = JSON.parse(text);
        const subject = data.subject || {};
        document.getElementById('lastName').value = subject.lName || '';
        document.getElementById('firstName').value = subject.fName || '';
        document.getElementById('extName').value = subject.Suffix || '';
        
        document.getElementById('message').innerHTML = '<p style="color:green;font-weight:bold;">QR LOADED: ' + 
          (subject.fName + ' ' + subject.lName).trim() + '</p>';
        
        stopQRScan();
      } catch (e) {
        document.getElementById('qr-status').textContent = 'Invalid QR data';
      }
    }

    function stopQRScan() {
      document.getElementById('qr-scanner').style.display = 'none';
      if (codeReader) codeReader.reset();
      const video = document.getElementById('qr-video');
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }

    async function checkDuplicate() {
      const payload = getPayload();
      if (!payload.lastName || !payload.firstName || !payload.assistanceType) {
        showMessage('Please fill all fields');
        return;
      }
      
      showMessage('Searching...');
      try {
        const data = await fetchData();
        const matches = data.filter(row => 
          row.lastName.toLowerCase() === payload.lastName.toLowerCase() &&
          row.firstName.toLowerCase() === payload.firstName.toLowerCase() &&
          row.assistanceType.toLowerCase() === payload.assistanceType.toLowerCase()
        );
        
        if (matches.length > 0) {
          showMessage('DUPLICATE FOUND (' + matches.length + ')');
          renderMatches(matches);
        } else {
          showMessage('NO DUPLICATE FOUND');
        }
      } catch (e) {
        showMessage('Error: ' + e.message);
      }
    }

    async function fetchData() {
      if (cachedData) return cachedData;
      
      try {
        const res = await fetch(CSV_URL);
        const csv = await res.text();
        cachedData = parseCSV(csv);
      } catch (e) {
        throw new Error('Cannot load data');
      }
      return cachedData;
    }

    function parseCSV(csv) {
      return csv.trim().split('\n').slice(1).map((line, i) => {
        const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
        return {
          date: cols[0] || '',
          lastName: cols[1] || '',
          firstName: cols[2] || '',
          extName: cols[3] || '',
          assistanceType: cols[4] || '',
          rowNumber: i + 2
        };
      }).filter(r => r.lastName);
    }

    function renderMatches(matches) {
      document.getElementById('results').style.display = 'block';
      let html = '<table border="1"><tr><th>Date</th><th>Last</th><th>First</th><th>Ext</th><th>Type</th><th>Row</th></tr>';
      matches.forEach(m => {
        html += `<tr>
          <td>${m.date}</td>
          <td style="color:red;font-weight:bold;">${m.lastName}</td>
          <td style="color:red;font-weight:bold;">${m.firstName}</td>
          <td>${m.extName}</td>
          <td style="background:#ffe6e6">${m.assistanceType}</td>
          <td style="color:red;font-weight:bold;">${m.rowNumber}</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('resultsTable').innerHTML = html;
    }

    function getPayload() {
      return {
        lastName: document.getElementById('lastName').value.trim(),
        firstName: document.getElementById('firstName').value.trim(),
        assistanceType: document.getElementById('assistanceType').value
      };
    }

    function showMessage(text) {
      document.getElementById('message').innerHTML = '<p style="padding:10px;margin:10px 0;font-weight:bold;' + 
        (text.includes('FOUND') ? 'color:green;background:#efe;' : 
         text.includes('Error') ? 'color:red;background:#fee;' : 
         'color:blue;background:#eef;') + '">' + text + '</p>';
    }

    function resetForm() {
      document.getElementById('searchForm').reset();
      document.getElementById('message').innerHTML = '';
      document.getElementById('results').style.display = 'none';
      cachedData = null;
    }

    async function testConnection() {
      try {
        const data = await fetchData();
        showMessage('Data loaded: ' + data.length + ' records');
      } catch (e) {
        showMessage('Data error: ' + e.message);
      }
    }

    // Enter key
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') checkDuplicate();
    });
  </script>
</body>
</html>
