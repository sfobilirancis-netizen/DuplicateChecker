<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <h2>Manual Input</h2>
    <input id="inputFName" placeholder="First Name" /><br><br>
    <input id="inputLName" placeholder="Last Name" /><br><br>
    <input id="inputSuffix" placeholder="Suffix" /><br><br>
    <button onclick="showManualResult()">Show Manual Result</button>
    <hr>

    <button id="scanBtn">Scan QR</button>
    <div id="status"></div>
    <div id="qr-reader" style="display: none;"></div>
    <div id="result" style="display: none;">
        <div id="fullName"></div>
        <button onclick="closeResult()">Scan Another</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("qr-reader");
        const scanBtn = document.getElementById("scanBtn");
        const statusDiv = document.getElementById("status");
        const qrReader = document.getElementById("qr-reader");
        const resultDiv = document.getElementById("result");
        const fullNameDiv = document.getElementById("fullName");
        const inputFName = document.getElementById("inputFName");
        const inputLName = document.getElementById("inputLName");
        const inputSuffix = document.getElementById("inputSuffix");

        let isScanning = false;

        scanBtn.addEventListener("click", async () => {
            if (isScanning) {
                stopScanner();
            } else {
                startScanner();
            }
        });

        async function startScanner() {
            try {
                scanBtn.textContent = "Stop Scanner";
                qrReader.style.display = "block";
                statusDiv.textContent = "Scanning...";
                statusDiv.style.display = "block";
                resultDiv.style.display = "none";

                isScanning = true;

                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    onScanError
                );
            } catch (err) {
                statusDiv.textContent = "Error: " + err;
            }
        }

        function stopScanner() {
            html5QrCode.stop().then(() => {
                isScanning = false;
                scanBtn.textContent = "Scan QR";
                qrReader.style.display = "none";
                statusDiv.style.display = "none";
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            try {
                const data = JSON.parse(decodedText);
                
                // Auto-populate the input fields
                inputFName.value = data.subject?.fName || "";
                inputLName.value = data.subject?.lName || "";
                inputSuffix.value = data.subject?.Suffix || "";
                
                // Show result
                const suffix = data.subject?.Suffix || "";
                const lName = data.subject?.lName || "N/A";
                const fName = data.subject?.fName || "N/A";
                
                const fullName = `${fName} ${suffix} ${lName}`.trim();
                fullNameDiv.textContent = fullName;
                
                stopScanner();
                resultDiv.style.display = "block";
                
            } catch (error) {
                statusDiv.textContent = "Invalid QR data";
            }
        }

        function onScanError(error) {
            // Silent for continuous scan
        }

        function closeResult() {
            resultDiv.style.display = "none";
            startScanner();
        }

        function showManualResult() {
            const fName = inputFName.value || "N/A";
            const lName = inputLName.value || "N/A";
            const suffix = inputSuffix.value || "";
            
            const fullName = `${fName} ${suffix} ${lName}`.trim();
            fullNameDiv.textContent = fullName;
            
            resultDiv.style.display = "block";
            qrReader.style.display = "none";
            statusDiv.style.display = "none";
            scanBtn.textContent = "Scan QR";
        }
    </script>
</body>
</html>
