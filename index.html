<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duplicate Checker</title>
  </head>

  <body>
    <header>
      <h1>Department of Social Welfare and Development</h1>
      <h2>Duplicate Checker</h2>
    </header>

    <main>
      <h3>Beneficiary Duplicate Validation</h3>
      
      <form id="searchForm">
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end;">
          <div>
            <label for="lastName">Last Name:</label>
            <input id="lastName" type="text" placeholder="Enter last name">
          </div>
          <button type="button" onclick="startQRScan()" style="padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            📱 Scan QR
          </button>
        </div>
        
        <div>
          <label for="firstName">First Name:</label>
          <input id="firstName" type="text" placeholder="Enter first name">
        </div>
        
        <div>
          <label for="extName">Extension Name:</label>
          <input id="extName" type="text" placeholder="JR, SR, etc.">
        </div>
        
        <div>
          <label for="assistanceType">Type of Assistance:</label>
          <select id="assistanceType">
            <option value="">Select type</option>
            <option value="Cash Relief Assistance">Cash Relief Assistance</option>
            <option value="Medical Assistance">Medical Assistance</option>
            <option value="Food Assistance">Food Assistance</option>
            <option value="Funeral Assistance">Funeral Assistance</option>
            <option value="Transportation Assistance">Transportation Assistance</option>
            <option value="Educational Assistance">Educational Assistance</option>
          </select>
        </div>
        
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button type="button" onclick="checkDuplicate()" style="flex: 1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">Check Duplicate</button>
          <button type="button" onclick="resetForm()" style="padding: 12px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">Reset</button>
          <button type="button" onclick="testConnection()" style="padding: 12px; background: #ffc107; color: black; border: none; border-radius: 5px; cursor: pointer;">Test Connection</button>
        </div>
      </form>

      <div id="message"></div>
      <div id="debug" style="display: none; background: #f0f0f0; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px; max-height: 300px; overflow: auto;"></div>

      <div id="results" style="display: none;">
        <h4>Match Results</h4>
        <div id="resultsTable"></div>
      </div>

      <!-- QR Scanner -->
      <div id="qr-scanner" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%;">
          <h3>📱 Scan QR Code</h3>
          <video id="qr-video" style="width: 100%; max-width: 300px; border-radius: 10px;" autoplay></video>
          <div id="qr-status" style="margin: 10px 0; font-weight: bold;"></div>
          <button onclick="stopQRScan()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Cancel</button>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
      let html5QrCode;
      let qrStream;
      
      // URLs
      const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv';
      const HTML_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pubhtml';
      
      let cachedData = null;

      async function testConnection() {
        showMessage('info', 'Testing connections...');
        document.getElementById('debug').style.display = 'none';
        
        try {
          const csvResponse = await fetch(CSV_URL);
          const htmlResponse = await fetch(HTML_URL);
          
          const csvStatus = csvResponse.ok ? `✅ CSV OK (${csvResponse.status})` : `❌ CSV Failed (${csvResponse.status})`;
          const htmlStatus = htmlResponse.ok ? `✅ HTML OK (${htmlResponse.status})` : `❌ HTML Failed (${htmlResponse.status})`;
          
          document.getElementById('debug').innerHTML = `
            <strong>Connection Test Results:</strong><br>
            ${csvStatus}<br>
            ${htmlStatus}
          `;
          document.getElementById('debug').style.display = 'block';
          
        } catch (error) {
          document.getElementById('debug').innerHTML = `Network error: ${error.message}`;
          document.getElementById('debug').style.display = 'block';
        }
      }

      async function fetchData() {
        if (cachedData) return cachedData;
        
        try {
          const response = await fetch(CSV_URL);
          if (response.ok) {
            const csvText = await response.text();
            cachedData = parseCSV(csvText);
            return cachedData;
          }
        } catch (e) {
          try {
            const response = await fetch(HTML_URL);
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const tables = doc.querySelectorAll('table');
            if (tables.length > 0) {
              cachedData = Array.from(tables[0].querySelectorAll('tr')).slice(1).map((row, index) => {
                const cells = row.querySelectorAll('td');
                return {
                  date: cells[0]?.textContent?.trim() || '',
                  lastName: cells[1]?.textContent?.trim() || '',
                  firstName: cells[2]?.textContent?.trim() || '',
                  extName: cells[3]?.textContent?.trim() || '',
                  assistanceType: cells[4]?.textContent?.trim() || '',
                  rowNumber: index + 2
                };
              }).filter(row => row.lastName);
              return cachedData;
            }
          } catch (htmlError) {
            throw new Error('Both CSV and HTML formats failed');
          }
        }
      }

      function parseCSV(csvText) {
        const lines = csvText.trim().split('\n').slice(1);
        return lines.map((line, index) => {
          const cols = parseCSVLine(line);
          return {
            date: cols[0]?.trim() || '',
            lastName: cols[1]?.trim() || '',
            firstName: cols[2]?.trim() || '',
            extName: cols[3]?.trim() || '',
            assistanceType: cols[4]?.trim() || '',
            rowNumber: index + 2
          };
        }).filter(row => row.lastName);
      }

      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') inQuotes = !inQuotes;
          else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else current += char;
        }
        result.push(current.trim());
        return result;
      }

      // QR Code Scanner
      async function startQRScan() {
        const scannerDiv = document.getElementById('qr-scanner');
        scannerDiv.style.display = 'flex';
        
        html5QrCode = new Html5Qrcode("qr-video");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        try {
          qrStream = await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onQRScanSuccess,
            undefined
          );
        } catch (err) {
          document.getElementById('qr-status').textContent = 'Error starting camera: ' + err;
        }
      }

      function stopQRScan() {
        if (html5QrCode && qrStream) {
          html5QrCode.stop(qrStream).then(() => {
            document.getElementById('qr-scanner').style.display = 'none';
            document.getElementById('qr-status').textContent = '';
          });
        } else {
          document.getElementById('qr-scanner').style.display = 'none';
        }
      }

      function onQRScanSuccess(decodedText) {
        console.log('QR Scanned:', decodedText);
        try {
          const qrData = JSON.parse(decodedText);
          const subject = qrData.subject || {};
          
          document.getElementById('lastName').value = subject.lName || '';
          document.getElementById('firstName').value = subject.fName || '';
          document.getElementById('extName').value = subject.Suffix || '';
          
          showMessage('ok', 'QR Scanned Successfully!', 
            `Loaded: ${subject.fName} ${subject.lName} ${subject.Suffix}`);
          
          stopQRScan();
        } catch (e) {
          document.getElementById('qr-status').textContent = 'Invalid QR format';
        }
      }

      async function checkDuplicate() {
        const payload = getPayload();
        if (!payload.lastName || !payload.firstName || !payload.assistanceType) {
          showMessage('err', 'Please fill Last Name, First Name, and Type of Assistance.');
          return;
        }

        setBusy(true);
        document.getElementById('debug').style.display = 'none';
        showMessage('info', 'Searching...', 'Checking for duplicates...');

        try {
          const data = await fetchData();
          const matches = data.filter(row => 
            row.lastName.toLowerCase().trim() === payload.lastName.toLowerCase().trim() &&
            row.firstName.toLowerCase().trim() === payload.firstName.toLowerCase().trim() &&
            row.assistanceType.toLowerCase().trim() === payload.assistanceType.toLowerCase().trim()
          );

          if (matches.length > 0) {
            showMessage('ok', `DUPLICATE FOUND (${matches.length} match${matches.length>1?'es':''})`);
            renderMatches(matches);
          } else {
            showMessage('ok', 'NO DUPLICATE FOUND');
          }
        } catch (error) {
          showMessage('err', `Error: ${error.message}`);
        } finally {
          setBusy(false);
        }
      }

      function getPayload() {
        return {
          lastName: document.getElementById("lastName").value.trim(),
          firstName: document.getElementById("firstName").value.trim(),
          extName: document.getElementById("extName").value.trim(),
          assistanceType: document.getElementById("assistanceType").value,
        };
      }

      function setBusy(isBusy) {
        const btn = document.querySelector('button[onclick="checkDuplicate()"]');
        btn.disabled = isBusy;
        btn.textContent = isBusy ? 'Checking...' : 'Check Duplicate';
      }

      function showMessage(type, title, detail = '') {
        const el = document.getElementById("message");
        const color = type === 'err' ? 'red' : type === 'ok' ? 'green' : 'blue';
        const bgColor = type === 'err' ? '#fee' : type === 'ok' ? '#efe' : '#eef';
        el.innerHTML = `<div style="padding: 15px; margin: 15px 0; border: 3px solid ${color}; background: ${bgColor}; font-size: 20px; font-weight: bold; text-align: center;">
          ${escapeHtml(title)}${detail ? `<br><small style="font-size: 14px;">${escapeHtml(detail)}</small>` : ''}
        </div>`;
      }

      function renderMatches(matches) {
        document.getElementById('results').style.display = 'block';
        let html = `<table border="1" style="width:100%;border-collapse:collapse;margin-top:10px;"><thead><tr style="background:#dc3545;color:white;">`;
        ['Date','Last','First','Ext','Type','Row'].forEach(h => html += `<th style="padding:12px;">${h}</th>`);
        html += `</tr></thead><tbody>`;
        matches.forEach(m => {
          html += `<tr style="background:#fff3cd;"><td style="padding:10px;">${escapeHtml(m.date)}</td>
            <td style="padding:10px;font-weight:bold;color:red;">${escapeHtml(m.lastName)}</td>
            <td style="padding:10px;font-weight:bold;color:red;">${escapeHtml(m.firstName)}</td>
            <td style="padding:10px;">${escapeHtml(m.extName)}</td>
            <td style="padding:10px;background:#ffe6e6;font-weight:bold;">${escapeHtml(m.assistanceType)}</td>
            <td style="padding:10px;font-weight:bold;color:red;">${m.rowNumber}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('resultsTable').innerHTML = html;
      }

      function resetForm() {
        document.getElementById('searchForm').reset();
        document.getElementById('message').innerHTML = '';
        document.getElementById('results').style.display = 'none';
        document.getElementById('debug').style.display = 'none';
        document.querySelector('button[onclick="checkDuplicate()"]').textContent = 'Check Duplicate';
        cachedData = null;
      }

      function escapeHtml(text) {
        const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#039;'};
        return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') e.preventDefault(), checkDuplicate();
      });
    </script>
  </body>
</html>
