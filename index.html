<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>

  <body>
    <div>
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" />
    </div>

    <div>
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" />
    </div>

    <div>
      <label for="extName">Ext Name</label>
      <input id="extName" type="text" />
    </div>

    <div>
      <label for="assistanceType">Assistance Type</label>
      <select id="assistanceType">
        <option value="" disabled selected>Select</option>
        <option value="Cash Relief Assistance">Cash Relief Assistance</option>
        <option value="Medical Assistance">Medical Assistance</option>
        <option value="Food Assistance">Food Assistance</option>
        <option value="Funeral Assistance">Funeral Assistance</option>
        <option value="Transportation Assistance">Transportation Assistance</option>
        <option value="Educational Assistance">Educational Assistance</option>
      </select>
    </div>

    <button id="scanBtn">Scan QR</button>
    <button id="checkBtn" style="display: none;">Check Duplicate</button>
    <button id="debugBtn">Debug Data</button>
    
    <div id="status"></div>
    <div id="qr-reader" style="display: none;"></div>

    <script>
      const html5QrCode = new Html5Qrcode("qr-reader");
      const scanBtn = document.getElementById("scanBtn");
      const checkBtn = document.getElementById("checkBtn");
      const debugBtn = document.getElementById("debugBtn");
      const statusDiv = document.getElementById("status");
      const qrReader = document.getElementById("qr-reader");
      
      const firstNameInput = document.getElementById("firstName");
      const lastNameInput = document.getElementById("lastName");
      const extNameInput = document.getElementById("extName");
      const assistanceTypeInput = document.getElementById("assistanceType");

      let isScanning = false;
      let spreadsheetData = [];

      // YOUR GOOGLE SHEETS CSV LINK
      const GOOGLE_SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/YOUR_SHEET_ID/pub?output=csv';

      async function loadSpreadsheetData() {
        try {
          statusDiv.textContent = "Loading...";
          statusDiv.style.display = "block";
          
          const response = await fetch(GOOGLE_SHEETS_CSV);
          const csvText = await response.text();
          
          // DEBUG: Show first few lines of CSV
          console.log("CSV Preview:", csvText.split('\n').slice(0, 5));
          
          spreadsheetData = parseCSV(csvText);
          statusDiv.textContent = `Loaded ${spreadsheetData.length} records`;
          
          // DEBUG: Show first record
          console.log("First record:", spreadsheetData[0]);
          console.log("All data:", spreadsheetData);
          
          setTimeout(() => statusDiv.style.display = "none", 3000);
        } catch (error) {
          statusDiv.textContent = "Error: " + error.message;
          console.error(error);
        }
      }

      function parseCSV(csvText) {
        const lines = csvText.split('\n').filter(line => line.trim());
        const data = [];
        
        for (let i = 1; i < lines.length; i++) {
          // Better CSV parsing - handle commas in quotes
          const cols = parseCSVLine(lines[i]);
          console.log(`Row ${i}:`, cols);
          
          if (cols[1] && cols[2]) {
            data.push({
              lastName: (cols[1] || '').trim(),
              firstName: (cols[2] || '').trim(),
              extName: (cols[3] || '').trim(),
              assistanceType: (cols[4] || '').trim()
            });
          }
        }
        return data;
      }

      // Better CSV parser
      function parseCSVLine(line) {
        const cols = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            cols.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        cols.push(current);
        return cols;
      }

      scanBtn.addEventListener("click", async () => {
        if (isScanning) {
          stopScanner();
        } else {
          await loadSpreadsheetData();
          startScanner();
        }
      });

      checkBtn.addEventListener("click", checkForDuplicate);

      debugBtn.addEventListener("click", () => {
        console.log("=== DEBUG INFO ===");
        console.log("Input values:", {
          lastName: lastNameInput.value.trim().toUpperCase(),
          firstName: firstNameInput.value.trim().toUpperCase(),
          extName: extNameInput.value.trim().toUpperCase(),
          assistanceType: assistanceTypeInput.value.trim()
        });
        console.log("Spreadsheet data sample:", spreadsheetData.slice(0, 3));
        statusDiv.textContent = `Debug: Check console (F12)`;
        statusDiv.style.display = "block";
      });

      async function startScanner() {
        try {
          scanBtn.textContent = "Stop Scanner";
          qrReader.style.display = "block";
          isScanning = true;

          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            onScanError
          );
        } catch (err) {
          console.error(err);
        }
      }

      function stopScanner() {
        html5QrCode.stop().then(() => {
          isScanning = false;
          scanBtn.textContent = "Scan QR";
          qrReader.style.display = "none";
          checkBtn.style.display = "inline-block";
        });
      }

      function onScanSuccess(decodedText) {
        try {
          const data = JSON.parse(decodedText);
          firstNameInput.value = data.subject?.fName || "";
          lastNameInput.value = data.subject?.lName || "";
          extNameInput.value = data.subject?.Suffix || "";
          stopScanner();
        } catch (error) {
          console.error("QR Error:", error);
        }
      }

      function onScanError() {}

      function checkForDuplicate() {
        const search = {
          lastName: lastNameInput.value.trim().toUpperCase(),
          firstName: firstNameInput.value.trim().toUpperCase(),
          extName: extNameInput.value.trim().toUpperCase(),
          assistanceType: assistanceTypeInput.value.trim()
        };

        console.log("Searching for:", search);

        if (!search.lastName || !search.firstName || !search.assistanceType) {
          statusDiv.textContent = "Fill all fields";
          statusDiv.style.display = "block";
          return;
        }

        let foundCount = 0;
        let matches = [];

        for (let i = 0; i < spreadsheetData.length; i++) {
          const row = spreadsheetData[i];
          const match = {
            lastName: row.lastName.toUpperCase() === search.lastName,
            firstName: row.firstName.toUpperCase() === search.firstName,
            extName: row.extName.toUpperCase() === search.extName,
            assistanceType: row.assistanceType === search.assistanceType
          };

          if (match.lastName && match.firstName && match.extName && match.assistanceType) {
            foundCount++;
            matches.push(row);
            console.log("MATCH FOUND at row", i, row);
          }
        }

        console.log("Total matches:", foundCount, matches);

        if (foundCount > 0) {
          statusDiv.innerHTML = `DUPLICATE FOUND (${foundCount} matches)<br>Check console for details`;
          statusDiv.style.color = "red";
        } else {
          statusDiv.innerHTML = "No duplicate found<br>Check console for debug info";
          statusDiv.style.color = "green";
        }
        statusDiv.style.display = "block";
      }
    </script>
  </body>
</html>
