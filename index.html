<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Duplicate Checker</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

<style>
      :root{
        --blue: #0038A8;
        --blue2: #0b4bd6;
        --red: #CE1126;
        --yellow: #FCD116;

        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #0b1220;
        --muted: #475569;
        --border: #e2e8f0;
        --shadow: 0 10px 28px rgba(2, 6, 23, 0.10);

        --radius: 14px;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px;
      }

      header {
        background: #fff;
        border-bottom: 4px solid var(--blue);
      }

      .headerTop {
        background: linear-gradient(90deg, var(--blue), var(--blue2));
        color: #fff;
        padding: 12px 0;
        text-align: center;
        user-select: none;
      }

      .titles {
        line-height: 1.25;
        max-width: 100%;
        overflow: hidden;
      }
      .titles .rp {
        font-size: 12px;
        opacity: 0.95;
        margin-bottom: 4px;
      }
      .titles .dept {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .titles .unit {
        font-size: 14px;
        opacity: 0.92;
        margin-top: 4px;
      }

      .ribbon {
        height: 6px;
        background: linear-gradient(
          90deg,
          var(--blue) 0 33%,
          var(--red) 33% 66%,
          var(--yellow) 66% 100%
        );
      }

      .card {
        margin-top: 16px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .cardHeader {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        background: #fbfdff;
      }

      .cardHeaderLeft {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        flex-grow: 1;
      }
      .cardHeader strong { font-size: 16px; }

      .cardBody { padding: 16px; }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 720px) {
        .grid { grid-template-columns: repeat(2, 1fr); }
        .span2 { grid-column: span 2; }
      }

      @media (min-width: 1024px) {
        .grid { grid-template-columns: repeat(4, 1fr); }
        .span2 { grid-column: span 2; }
        .span4 { grid-column: span 4; }
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input, select {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        outline: none;
        font-size: 14px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input:focus, select:focus {
        border-color: rgba(0, 56, 168, 0.55);
        box-shadow: 0 0 0 4px rgba(0, 56, 168, 0.14);
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 6px;
      }

      button.btn {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        transition: transform 0.08s ease, opacity 0.15s ease;
      }
      button.btn:active { transform: translateY(1px); }
      button.btnPrimary {
        background: linear-gradient(135deg, var(--blue), var(--blue2));
        border-color: rgba(0, 56, 168, 0.35);
        color: #fff;
      }
      button.btnPrimary:hover { opacity: 0.95; }
      button.btnGhost { background: transparent; }

      .msg {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #f8fafc;
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .msg .icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 4px;
        background: #94a3b8;
        flex: 0 0 auto;
      }
      .msg.ok { background: #f0fdf4; border-color: #bbf7d0; }
      .msg.ok .icon { background: #22c55e; }
      .msg.err { background: #fef2f2; border-color: #fecaca; }
      .msg.err .icon { background: #ef4444; }
      .msg strong { font-size: 13px; }
      .msg .small { margin-top: 2px; font-size: 12px; color: var(--muted); }

      .results {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: #fff;
      }

      .resultsHeader {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          90deg,
          rgba(0, 56, 168, 0.06),
          rgba(206, 17, 38, 0.06)
        );
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        color: #0f172a;
        white-space: nowrap;
      }
      .pill.type {
        border-color: rgba(206, 17, 38, 0.25);
        background: rgba(206, 17, 38, 0.08);
        color: #7f1d1d;
      }

      .tableWrap { overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 820px; }
      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--blue);
        color: #fff;
        text-align: left;
        padding: 12px;
        font-size: 12px;
      }
      tbody td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      tbody tr:hover td { background: #f8fafc; }
    </style>

</style>
</head>

<body>

<header>
<div class="headerTop">
<div class="container">
<div>Republic of the Philippines</div>
<div><strong>Department of Social Welfare and Development</strong></div>
<div>Duplicate Checker</div>
</div>
</div>
<div class="ribbon"></div>
</header>

<main class="container">

<div class="card">

<div class="cardHeader">
<strong>Beneficiary Duplicate Validation</strong>
</div>

<div class="cardBody">

<div class="grid">

<div>
<label>Beneficiary's Last Name</label>
<input id="lastName" placeholder="Enter beneficiary's last name" autocomplete="off" >
</div>

<div>
<label>Beneficiary's First Name</label>
<input id="firstName" placeholder="Enter beneficiary's first name" autocomplete="off" >
</div>

<div>
<label>Beneficiary's Extension (if any)</label>
<input id="extName" placeholder="e.g. JR / SR / II" autocomplete="off" >
</div>

<div>
<label>Type of Assistance</label>
<select id="assistanceType">
<option value="">Select type</option>
<option>Cash Relief Assistance</option>
<option>Medical Assistance</option>
<option>Food Assistance</option>
<option>Funeral Assistance</option>
<option>Transportation Assistance</option>
<option>Educational Assistance</option>
</select>
</div>

<div class="span2">
<label>Actions</label>
<div class="actions">
<button class="btnPrimary" onclick="startQRScanner()">Scan QR</button>
<button onclick="checkDuplicate()">Check Duplicate</button>
<button onclick="resetForm()">Reset</button>
</div>
</div>

</div>

<div id="qr-reader"></div>
<div id="message"></div>

<div id="results" class="results" style="display:none;">
<div class="resultsHeader">Match Results</div>
<div id="resultsTableWrap"></div>
</div>

</div>
</div>

</main>

<script>

let qrScanner;

async function startQRScanner(){

const qrContainer=document.getElementById("qr-reader");
qrContainer.innerHTML="";

qrScanner=new Html5Qrcode("qr-reader");

await qrScanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
qrSuccess
);

}

function qrSuccess(decodedText){

try{

const data=JSON.parse(decodedText);

document.getElementById("lastName").value=data.subject.lName||"";
document.getElementById("firstName").value=data.subject.fName||"";
document.getElementById("extName").value=data.subject.Suffix||"";

qrScanner.stop();
document.getElementById("qr-reader").innerHTML="";

}catch(e){

showMessage("err","Invalid QR format","Unable to read QR");

}

}

const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv';

let cachedData=null;

async function fetchData(){

if(cachedData) return cachedData;

const response=await fetch(CSV_URL);
const csvText=await response.text();

cachedData=parseCSV(csvText);

return cachedData;

}

function parseCSV(csv){

const rows=csv.trim().split("\n").slice(1);

return rows.map((r,i)=>{

const c=r.split(",");

return{
date:c[0],
last:c[1],
first:c[2],
ext:c[3],
type:c[4],
row:i+2
}

})

}

async function checkDuplicate(){

const last=document.getElementById("lastName").value.trim().toLowerCase();
const first=document.getElementById("firstName").value.trim().toLowerCase();
const type=document.getElementById("assistanceType").value.trim().toLowerCase();

if(!last||!first||!type){
showMessage("err","Missing Information","Fill required fields");
return;
}

showMessage("msg","Searching","Checking records...");

const data=await fetchData();

const matches=data.filter(r=>
r.last.toLowerCase()==last &&
r.first.toLowerCase()==first &&
r.type.toLowerCase()==type
);

if(matches.length===0){

showMessage("ok","No duplicate found","Beneficiary may proceed");
document.getElementById("results").style.display="none";

return;

}

showMessage("err","Duplicate Found",matches.length+" record(s) found");

let html=`<table>
<thead>
<tr>
<th>Date</th>
<th>Last</th>
<th>First</th>
<th>Ext</th>
<th>Type</th>
<th>Row #</th>
</tr>
</thead>
<tbody>`;

matches.forEach(m=>{

html+=`
<tr>
<td>${m.date}</td>
<td>${m.last}</td>
<td>${m.first}</td>
<td>${m.ext}</td>
<td>${m.type}</td>
<td>${m.row}</td>
</tr>`;

})

html+=`</tbody></table>`;

document.getElementById("resultsTableWrap").innerHTML=html;
document.getElementById("results").style.display="block";

}

function showMessage(type,title,detail){

const cls=type==="err"?"msg err":type==="ok"?"msg ok":"msg";

document.getElementById("message").innerHTML=
`<div class="${cls}">
<div class="icon"></div>
<div>
<strong>${title}</strong>
<div style="font-size:12px">${detail}</div>
</div>
</div>`;

}

function resetForm(){

document.getElementById("lastName").value="";
document.getElementById("firstName").value="";
document.getElementById("extName").value="";
document.getElementById("assistanceType").value="";

document.getElementById("message").innerHTML="";
document.getElementById("results").style.display="none";
document.getElementById("qr-reader").innerHTML="";

}

</script>

</body>
</html>
