<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Duplicate Checker</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
/* CSS Variables */
:root{
  --blue:#0038A8;
  --blue2:#0b4bd6;
  --red:#CE1126;
  --yellow:#FCD116;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0b1220;
  --muted:#475569;
  --border:#e2e8f0;
  --shadow:0 10px 28px rgba(2,6,23,0.10);
  --radius:14px;
}

/* Base Styles */
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);}
.container{max-width:1120px;margin:auto;padding:16px;}

/* Header */
header{background:#fff;border-bottom:4px solid var(--blue);}
.headerTop{background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;padding:12px 0;text-align:center;}
.titles .rp{font-size:12px}
.titles .dept{font-size:20px;font-weight:800}
.titles .unit{font-size:14px}
.ribbon{height:6px;background:linear-gradient(90deg,var(--blue) 0 33%,var(--red) 33% 66%,var(--yellow) 66% 100%);}

/* Cards & Layout */
.card{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.cardHeader{padding:14px 16px;border-bottom:1px solid var(--border);background:#fbfdff;}
.cardBody{padding:16px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:720px){.grid{grid-template-columns:repeat(2,1fr)}.span2{grid-column:span 2}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}.span2{grid-column:span 2}.span4{grid-column:span 4}}

/* Form Elements */
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
input,select{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;font-size:14px;outline:none;}
input:focus,select:focus{border-color:rgba(0,56,168,0.55);box-shadow:0 0 0 4px rgba(0,56,168,0.14);}

/* Buttons */
.actions{display:flex;gap:10px;flex-wrap:wrap;}
button.btn {border: 1px solid var(--border);background: #fff;color: var(--text);padding: 10px 14px;border-radius: 12px;cursor: pointer;font-weight: 700;font-size: 13px;text-align: center;transition: transform 0.08s ease, opacity 0.15s ease;}
button.btn:active { transform: translateY(1px); }
button.btnPrimary {background: linear-gradient(135deg, var(--blue), var(--blue2));border-color: rgba(0, 56, 168, 0.35);color: #fff !important;font-weight: 700;font-size: 14px;text-align: center;padding: 10px 16px;white-space: nowrap;}
button.btnPrimary:hover { opacity: 0.95; }
button.btnGhost {background: transparent;color: var(--text);border: 1px solid var(--border);font-weight: 700;font-size: 13px;padding: 10px 14px;cursor: pointer;text-align: center;}
button.btnGhost:hover { background: #f1f5f9; }

/* Messages */
.msg{margin-top:14px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;}
.msg.ok{background:#f0fdf4;border-color:#bbf7d0}
.msg.err{background:#fef2f2;border-color:#fecaca}
.msg .icon{width:10px;height:10px;border-radius:50%;margin-top:4px;}
.msg.ok .icon{background:#22c55e}
.msg.err .icon{background:#ef4444}
.msg strong{font-size:13px}
.msg .small{font-size:12px;color:var(--muted);margin-top:2px}

/* Results Table */
.results{margin-top:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#fff;}
.resultsHeader{padding:12px 14px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(0,56,168,0.06),rgba(206,17,38,0.06));display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:700;}
.pill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#f8fafc;font-size:12px;font-weight:700;color:#0f172a;white-space:nowrap;}
.pill.type{border-color:rgba(206,17,38,0.25);background:rgba(206,17,38,0.08);color:#7f1d1d;}
.tableWrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:820px}
thead th{position:sticky;top:0;background:var(--blue);color:#fff;padding:12px;font-size:12px;text-align:left;}
tbody td{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
tbody tr:hover td{background:#f8fafc}

/* IMPROVED QR Scanner Overlay - LARGER & BETTER */
#qr-overlay {
  position: fixed;
  top: 0; left:0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
  box-sizing: border-box;
}
#qr-overlay label {
  color: #fff;
  font-weight: 700;
  font-size: 24px;
  margin-bottom: 20px;
  text-align: center;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
#qr-instructions {
  color: #fff;
  font-size: 16px;
  margin-bottom: 15px;
  text-align: center;
  opacity: 0.9;
}
#qr-reader {
  width: 95vw;
  max-width: 600px;
  height: 95vw;
  max-height: 600px;
  border-radius: 20px;
  background:#000;
  overflow:hidden;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
#qr-reader video {
  object-fit: cover !important;
  width: 100% !important;
  height: 100% !important;
}

/* Enhanced Scanning Frame - LARGER scanning area */
#qr-reader::before {
  content:"";
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:85%; 
  height:85%;
  border: 4px solid #00ff88;
  border-radius: 12px;
  box-sizing:border-box;
  pointer-events:none;
  animation: scanPulse 2s infinite;
  box-shadow: 0 0 30px #00ff88;
}
@keyframes scanPulse {
  0% { 
    opacity: 0.7; 
    box-shadow: 0 0 20px #00ff88;
    border-color: #00ff88;
  }
  50% { 
    opacity: 1; 
    box-shadow: 0 0 40px #00ff88;
    border-color: #00cc6a;
  }
  100% { 
    opacity: 0.7; 
    box-shadow: 0 0 20px #00ff88;
    border-color: #00ff88;
  }
}

/* Cancel & Scan buttons */
#qr-overlay .qr-buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
#qr-overlay button.cancel-btn,
#qr-overlay button.flash-btn {
  padding: 14px 24px;
  border-radius: 16px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s ease;
}
#qr-overlay button.cancel-btn {
  background: #ef4444;
  color: #fff;
}
#qr-overlay button.flash-btn {
  background: #facc15;
  color: #000;
}
#qr-overlay button.cancel-btn:hover { 
  background: #dc2626;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(239,68,68,0.4);
}
#qr-overlay button.flash-btn:hover { 
  background: #eab308;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(250,204,21,0.4);
}

/* Success animation */
@keyframes qrSuccessAnim {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.qr-success {
  animation: qrSuccessAnim 0.3s ease-out;
}
</style>
</head>

<body>
<header>
  <div class="headerTop">
    <div class="container">
      <div class="titles">
        <div class="rp">Republic of the Philippines</div>
        <div class="dept">Department of Social Welfare and Development</div>
        <div class="unit">Duplicate Checker</div>
      </div>
    </div>
  </div>
  <div class="ribbon"></div>
</header>

<main class="container">
  <div class="card">
    <div class="cardHeader"><strong>Beneficiary Duplicate Validation</strong></div>
    <div class="cardBody">
      <div class="grid">
        <div>
          <label>Beneficiary's Last Name</label>
          <input id="lastName" placeholder="Enter beneficiary's last name">
        </div>
        <div>
          <label>Beneficiary's First Name</label>
          <input id="firstName" placeholder="Enter beneficiary's first name">
        </div>
        <div>
          <label>Beneficiary's Extension (if any)</label>
          <input id="extName" placeholder="e.g. JR / SR / II">
        </div>
        <div>
          <label>Type of Assistance</label>
          <select id="assistanceType">
            <option value="">Select type</option>
            <option>Cash Relief Assistance</option>
            <option>Medical Assistance</option>
            <option>Food Assistance</option>
            <option>Funeral Assistance</option>
            <option>Transportation Assistance</option>
            <option>Educational Assistance</option>
          </select>
        </div>
        <div class="span2">
          <label>Actions</label>
          <div class="actions">
            <button class="btn btnPrimary" onclick="app.startQRScanner()">📱 Scan QR</button>
            <button class="btn btnPrimary" onclick="app.checkDuplicate()">🔍 Check Duplicate</button>
            <button class="btn" onclick="app.resetForm()">🔄 Reset</button>
          </div>
        </div>
      </div>

      <div id="message"></div>
      <div id="results" class="results" style="display:none;">
        <div class="resultsHeader">Match Results</div>
        <div class="tableWrap" id="resultsTableWrap"></div>
      </div>
    </div>
  </div>
</main>

<script>
// ========================================
// APP STATE & CONFIGURATION
// ========================================
const app = {
  qrScanner: null,
  cachedData: null,
  CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv",
  
  // IMPROVED QR Scanner Config - BETTER FOR DISTANCE SCANNING
  qrConfig: {
    fps: 15,           // Higher FPS for smoother scanning
    qrbox: { width: 450, height: 450 },  // Larger scan area
    aspectRatio: 1.0,
    disableFlip: false,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
  }
};

// ========================================
// QR SCANNER METHODS - IMPROVED
// ========================================
app.startQRScanner = async function() {
  // Create enhanced overlay
  const overlay = document.createElement("div");
  overlay.id = "qr-overlay";
  overlay.innerHTML = `
    <label>📱 Scan QR Code</label>
    <div id="qr-instructions">
      Hold steady • Keep QR in frame • Works from 1-3 feet away
    </div>
    <div id="qr-reader"></div>
    <div class="qr-buttons">
      <button class="flash-btn" id="flash-toggle" onclick="app.toggleFlash()">💡 Torch</button>
      <button class="cancel-btn" onclick="app.cancelQRScanner()">❌ Cancel</button>
    </div>
  `;
  document.body.appendChild(overlay);

  try {
    const qrReader = document.getElementById("qr-reader");
    app.qrScanner = new Html5Qrcode("qr-reader");
    
    // Start with enhanced configuration for distance scanning
    const cameras = await Html5Qrcode.getCameras();
    const config = {
      ...app.qrConfig,
      facingMode: "environment"
    };

    await app.qrScanner.start(config, app.qrSuccess, app.qrError);
    
    // Success feedback
    overlay.classList.add('qr-success');
    
  } catch (err) {
    app.showMessage("err", "Scanner Error", "Unable to start camera");
    app.cancelQRScanner();
  }
};

app.toggleFlash = async function() {
  if (!app.qrScanner) return;
  try {
    const isAvailable = await app.qrScanner.isTorchAvailable();
    if (isAvailable) {
      await app.qrScanner.toggleTorch();
    }
  } catch (err) {
    console.log("Flash not available");
  }
};

app.cancelQRScanner = function() {
  if (app.qrScanner) {
    app.qrScanner.stop().then(() => {
      app.qrScanner = null;
    }).catch(console.error);
  }
  const overlay = document.getElementById("qr-overlay");
  if (overlay) overlay.remove();
};

app.qrSuccess = function(decodedText) {
  try {
    const data = JSON.parse(decodedText);
    document.getElementById("lastName").value = data.subject?.lName || "";
    document.getElementById("firstName").value = data.subject?.fName || "";
    document.getElementById("extName").value = data.subject?.Suffix || "";
    
    app.showMessage("ok", "QR Scanned Successfully", "Data loaded from QR code");
    app.cancelQRScanner();
  } catch (e) {
    app.showMessage("err", "Invalid QR", "QR format not recognized");
  }
};

app.qrError = function(err) {
  // Silent error handling for continuous scanning
  console.log("QR scan error:", err);
};

// ========================================
// DATA METHODS
// ========================================
app.fetchData = async function() {
  if (app.cachedData) return app.cachedData;
  
  try {
    const response = await fetch(app.CSV_URL);
    const csvText = await response.text();
    app.cachedData = app.parseCSV(csvText);
    return app.cachedData;
  } catch (err) {
    app.showMessage("err", "Data Error", "Unable to load records");
    throw err;
  }
};

app.parseCSV = function(csv) {
  return csv.trim().split("\n").slice(1).map((row, i) => {
    const cols = row.split(",");
    return {
      date: cols[0],
      last: cols[1],
      first: cols[2],
      ext: cols[3] || "",
      type: cols[4],
      row: i + 2
    };
  });
};

app.addThreeMonths = function(dateStr) {
  const date = new Date(dateStr);
  date.setMonth(date.getMonth() + 3);
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const yyyy = date.getFullYear();
  return `${mm}/${dd}/${yyyy}`;
};

// ========================================
// MAIN FUNCTIONALITY
// ========================================
app.checkDuplicate = async function() {
  const last = document.getElementById("lastName").value.trim().toLowerCase();
  const first = document.getElementById("firstName").value.trim().toLowerCase();
  const type = document.getElementById("assistanceType").value.trim().toLowerCase();
  
  if (!last || !first || !type) {
    app.showMessage("err", "Missing Information", "Please fill all required fields");
    return;
  }

  app.showMessage("msg", "Searching", "Checking records...");
  
  try {
    const data = await app.fetchData();
    const matches = data.filter(r => 
      r.last.toLowerCase() === last && 
      r.first.toLowerCase() === first && 
      r.type.toLowerCase() === type
    );
    
    if (matches.length === 0) {
      app.showMessage("ok", "✅ No Duplicate Found", "Beneficiary may proceed");
      document.getElementById("results").style.display = "none";
      return;
    }

    app.showMessage("err", "⚠️ Duplicate Found", `${matches.length} record(s) found`);
    app.renderResults(matches);
    
  } catch (err) {
    app.showMessage("
