<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duplicate Checker</title>
    <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Department of Social Welfare and Development</h1>
      <h2>Duplicate Checker</h2>
    </header>

    <main>
      <h3>Beneficiary Duplicate Validation</h3>
      
      <form id="searchForm">
        <div>
          <label for="lastName">Last Name:</label>
          <input id="lastName" type="text" placeholder="Enter last name">
        </div>
        
        <div>
          <label for="firstName">First Name:</label>
          <input id="firstName" type="text" placeholder="Enter first name">
        </div>
        
        <div>
          <label for="extName">Extension Name:</label>
          <input id="extName" type="text" placeholder="JR, SR, etc.">
        </div>
        
        <div>
          <label for="assistanceType">Type of Assistance:</label>
          <select id="assistanceType">
            <option value="">Select type</option>
            <option value="Cash Relief Assistance">Cash Relief Assistance</option>
            <option value="Medical Assistance">Medical Assistance</option>
            <option value="Food Assistance">Food Assistance</option>
            <option value="Funeral Assistance">Funeral Assistance</option>
            <option value="Transportation Assistance">Transportation Assistance</option>
            <option value="Educational Assistance">Educational Assistance</option>
          </select>
        </div>
        
        <button type="button" onclick="checkDuplicate()">Check Duplicate</button>
        <button type="button" onclick="resetForm()">Reset</button>
        <button type="button" onclick="testConnection()">Test Connection</button>
        <button type="button" onclick="startQRScan()">🖼️ Scan QR</button>
      </form>

      <!-- QR Scanner Container -->
      <div id="qr-container" style="display:none; text-align:center; margin:20px 0; background:#f8f9fa; padding:20px; border-radius:10px;">
        <video id="qr-video" 
               style="width:100%; max-width:400px; height:auto; border:2px solid #007bff; border-radius:10px;">
        </video>
        <div id="qr-status" style="margin-top:15px; font-weight:bold; color:#007bff;"></div>
        <button type="button" onclick="stopQRScan()" style="margin-top:10px; padding:10px 20px; background:#dc3545; color:white; border:none; border-radius:5px; font-size:16px;">Stop Scan</button>
      </div>

      <div id="message"></div>
      <div id="debug" style="display: none; background: #f0f0f0; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px; max-height: 300px; overflow: auto;"></div>

      <div id="results" style="display: none;">
        <h4>Match Results</h4>
        <div id="resultsTable"></div>
      </div>
    </main>

    <script>
      let codeReader = null;
      let currentStream = null;

      // Your existing URLs and cachedData
      const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pub?gid=2133064879&single=true&output=csv';
      const HTML_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdWgtp7QemefsPk4fCle7BY7DO9E068Q3NlmUWdGzRwkzEfwxBj9-srMN_cBTpGOwkRb6TdgjVsKJq/pubhtml';
      let cachedData = null;

      async function startQRScan() {
        try {
          // Hide other elements
          document.getElementById('message').innerHTML = '';
          
          // Initialize ZXing reader
          codeReader = new ZXing.BrowserMultiFormatReader();
          
          // Show scanner
          document.getElementById('qr-container').style.display = 'block';
          updateQRStatus('🔄 Starting camera...');

          // Get video element
          const video = document.getElementById('qr-video');
          
          // Request camera access
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
              facingMode: 'environment', // Back camera
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          });
          
          currentStream = stream;
          video.srcObject = stream;
          await video.play();
          
          updateQRStatus('📱 Scanning... Point QR code at camera');
          
          // Start decoding
          codeReader.decodeFromVideoDevice(null, 'qr-video', async (result, error) => {
            if (result) {
              stopQRScan();
              await processQRData(result.text);
            }
            if (error && !(error.name === 'NotFoundError')) {
              console.error('Decode error:', error);
            }
          });
          
        } catch (error) {
          console.error('Camera error:', error);
          let errorMsg = 'Camera access failed';
          if (error.name === 'NotAllowedError') {
            errorMsg = '🚫 Camera permission denied. Please allow camera access.';
          } else if (error.name === 'NotFoundError') {
            errorMsg = '📷 No camera found on this device.';
          } else if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            errorMsg = '❌ Browser doesn\'t support camera. Use Chrome/Safari/Firefox.';
          }
          showMessage('err', errorMsg);
          document.getElementById('qr-container').style.display = 'none';
        }
      }

      function stopQRScan() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
        if (codeReader) {
          codeReader.reset();
          codeReader = null;
        }
        document.getElementById('qr-container').style.display = 'none';
        document.getElementById('qr-status').innerHTML = '';
      }

      async function processQRData(qrData) {
        try {
          updateQRStatus('✅ Processing QR data...');
          const parsedData = JSON.parse(qrData);
          const subject = parsedData.subject || {};
          
          // Auto-fill form
          document.getElementById('lastName').value = subject.lName || '';
          document.getElementById('firstName').value = subject.fName || '';
          document.getElementById('extName').value = subject.Suffix || '';
          
          showMessage('ok', '✅ QR Scanned Successfully!', 
            `👤 ${subject.fName || ''} ${subject.lName || ''} ${subject.Suffix || ''}`);
          
          console.log('✅ QR Parsed:', parsedData);
          
        } catch (error) {
          showMessage('err', '❌ Invalid QR Format', 'QR code doesn\'t contain valid beneficiary data');
          console.error('Parse error:', error, qrData);
        }
      }

      function updateQRStatus(message) {
        document.getElementById('qr-status').textContent = message;
      }

      // Your existing functions (unchanged)
      async function testConnection() {
        showMessage('info', 'Testing connections...');
        document.getElementById('debug').style.display = 'none';
        stopQRScan();
        
        try {
          const csvResponse = await fetch(CSV_URL);
          const csvStatus = csvResponse.ok ? `✅ CSV OK (${csvResponse.status})` : `❌ CSV Failed (${csvResponse.status})`;
          const htmlResponse = await fetch(HTML_URL);
          const htmlStatus = htmlResponse.ok ? `✅ HTML OK (${htmlResponse.status})` : `❌ HTML Failed (${htmlResponse.status})`;
          
          document.getElementById('debug').innerHTML = `<strong>Connection Test:</strong><br>${csvStatus}<br>${htmlStatus}`;
          document.getElementById('debug').style.display = 'block';
        } catch (error) {
          document.getElementById('debug').innerHTML = `Network error: ${error.message}`;
          document.getElementById('debug').style.display = 'block';
        }
      }

      // Include all your other existing functions here (fetchData, parseCSV, checkDuplicate, etc.)
      // ... [All your existing functions remain exactly the same] ...

      async function fetchData() {
        if (cachedData) return cachedData;
        try {
          const response = await fetch(CSV_URL);
          if (response.ok) {
            const csvText = await response.text();
            cachedData = parseCSV(csvText);
            return cachedData;
          }
        } catch (csvError) {
          console.log('CSV failed, trying HTML...');
        }
        try {
          const response = await fetch(HTML_URL);
          const html = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const tables = doc.querySelectorAll('table');
          if (tables.length > 0) {
            cachedData = Array.from(tables[0].querySelectorAll('tr')).slice(1).map((row, index) => {
              const cells = row.querySelectorAll('td');
              return {
                date: cells[0]?.textContent?.trim() || '',
                lastName: cells[1]?.textContent?.trim() || '',
                firstName: cells[2]?.textContent?.trim() || '',
                extName: cells[3]?.textContent?.trim() || '',
                assistanceType: cells[4]?.textContent?.trim() || '',
                rowNumber: index + 2
              };
            }).filter(row => row.lastName);
            return cachedData;
          }
        } catch (htmlError) {}
        throw new Error('Both formats failed');
      }

        const lines =
